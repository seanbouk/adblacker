<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Ad Blacker</h1>
    <label class="toggle">
      <input type="checkbox" id="globalToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <div class="site-row">
      <span id="currentSite" class="site-name">—</span>
      <label class="toggle small">
        <input type="checkbox" id="siteToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section stats">
    <div class="stat">
      <span class="stat-value" id="adCount">0</span>
      <span class="stat-label">Ads blacked</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="filterCount">0</span>
      <span class="stat-label">Filters</span>
    </div>
  </div>

  <div class="section">
    <h2>Whitelist</h2>
    <div id="whitelistInfo" class="whitelist-info">No whitelisted elements</div>
    <button id="clearWhitelist" class="btn-clear" style="display:none">Clear all</button>
  </div>

  <div class="footer">
    <span class="version">v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
